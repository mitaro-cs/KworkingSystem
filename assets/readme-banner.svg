<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Campus Coworking dashboard banner</title>
  <desc id="desc">A monochrome university coworking dashboard illustration with booking, focus timer, activity cards and a library panel.</desc>

  <defs>
    <linearGradient id="bg" x1="66" y1="32" x2="1092" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.55" stop-color="#151515"/>
      <stop offset="1" stop-color="#262626"/>
    </linearGradient>
    <linearGradient id="gold" x1="78" y1="104" x2="434" y2="232" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#BDBDBD"/>
    </linearGradient>
    <linearGradient id="panel" x1="706" y1="68" x2="1096" y2="348" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="seat" x1="790" y1="172" x2="1008" y2="259" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#AFAFAF"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="640" y="34" width="520" height="340" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect x="24" y="24" width="1152" height="372" rx="20" stroke="#FFFFFF" stroke-opacity="0.11" stroke-width="2"/>

  <rect x="76" y="62" width="176" height="34" rx="8" fill="#FFFFFF" fill-opacity="0.1" stroke="#FFFFFF" stroke-opacity="0.14"/>
  <text x="164" y="84" fill="#E5E5E5" font-family="Space Grotesk, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">FLASK + SQLITE</text>

  <text x="76" y="160" fill="url(#gold)" font-family="Space Grotesk, Arial, sans-serif" font-size="58" font-weight="700">Campus</text>
  <text x="76" y="224" fill="#FFFFFF" font-family="Space Grotesk, Arial, sans-serif" font-size="66" font-weight="700">Coworking</text>

  <text x="80" y="272" fill="#D4D4D4" font-family="IBM Plex Mono, Menlo, monospace" font-size="20" font-weight="500">Book spots, track focus time, and keep</text>
  <text x="80" y="300" fill="#D4D4D4" font-family="IBM Plex Mono, Menlo, monospace" font-size="20" font-weight="500">the campus workspace organized.</text>

  <g font-family="Space Grotesk, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="78" y="332" width="136" height="36" rx="8" fill="#FFFFFF"/>
    <text x="146" y="355" fill="#050505" text-anchor="middle">BOOKING</text>

    <rect x="228" y="332" width="122" height="36" rx="8" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="289" y="355" fill="#FFFFFF" text-anchor="middle">POMODORO</text>

    <rect x="364" y="332" width="92" height="36" rx="8" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="410" y="355" fill="#FFFFFF" text-anchor="middle">LOFI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="688" y="62" width="424" height="292" rx="18" fill="url(#panel)" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <rect x="710" y="84" width="380" height="44" rx="10" fill="#050505" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <circle cx="734" cy="106" r="6" fill="#FFFFFF"/>
    <circle cx="756" cy="106" r="6" fill="#BDBDBD"/>
    <circle cx="778" cy="106" r="6" fill="#E5E5E5" fill-opacity="0.72"/>
    <text x="1038" y="111" fill="#BDBDBD" font-family="IBM Plex Mono, Menlo, monospace" font-size="12" font-weight="500" text-anchor="end">live dashboard</text>

    <rect x="710" y="146" width="160" height="86" rx="12" fill="#050505" fill-opacity="0.5" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="730" y="174" fill="#E5E5E5" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="500">occupied seats</text>
    <text x="730" y="212" fill="#FFFFFF" font-family="Space Grotesk, Arial, sans-serif" font-size="36" font-weight="700">37%</text>
    <rect x="812" y="190" width="34" height="10" rx="5" fill="#FFFFFF"/>
    <rect x="812" y="206" width="22" height="10" rx="5" fill="#BDBDBD"/>

    <rect x="888" y="146" width="202" height="86" rx="12" fill="#050505" fill-opacity="0.5" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="908" y="174" fill="#E5E5E5" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="500">focus session</text>
    <text x="908" y="212" fill="#FFFFFF" font-family="Space Grotesk, Arial, sans-serif" font-size="36" font-weight="700">25:00</text>
    <rect x="1012" y="188" width="44" height="22" rx="7" fill="#FFFFFF"/>
    <text x="1034" y="203" fill="#050505" font-family="Space Grotesk, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">RUN</text>

    <rect x="710" y="250" width="220" height="82" rx="12" fill="#050505" fill-opacity="0.5" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="730" y="278" fill="#E5E5E5" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="500">available spots</text>
    <g fill="url(#seat)">
      <rect x="730" y="296" width="34" height="16" rx="5"/>
      <rect x="774" y="296" width="34" height="16" rx="5" opacity="0.72"/>
      <rect x="818" y="296" width="34" height="16" rx="5" opacity="0.42"/>
    </g>
    <rect x="862" y="296" width="42" height="16" rx="5" fill="#FFFFFF" fill-opacity="0.14"/>

    <rect x="948" y="250" width="142" height="82" rx="12" fill="#050505" fill-opacity="0.5" stroke="#FFFFFF" stroke-opacity="0.09"/>
    <text x="968" y="278" fill="#E5E5E5" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="500">library</text>
    <rect x="968" y="294" width="88" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.72"/>
    <rect x="968" y="312" width="70" height="8" rx="4" fill="#BDBDBD" fill-opacity="0.8"/>
  </g>
</svg>
